name: PDF generation via Puppeteer

on:
  push:
    branches: [ "chrome-action" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Serve Files
      uses: Eun/http-server-action@v1
      with:
        directory: ${{ github.workspace }}
        port: 8080
        no-cache: false
        index-files: |
          ["$PWD/Quarkdown-Mock/index.html"]
        allowed-methods: |
          ["GET", "HEAD"]
        content-types: |
          {
            "appcache": "text/cache-manifest",
            "css": "text/css",
            "gif": "image/gif",
            "html": "text/html",
            "ico": "image/x-icon",
            "jpeg": "image/jpeg",
            "jpg": "image/jpeg",
            "js": "text/javascript",
            "json": "application/json",
            "png": "image/png",
            "txt": "text/plain",
            "xml": "text/xml"
          }
        log: "log.txt"

    - name: Install Dependencies
      uses: actions/setup-node@v4
      env:
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
      with:
        args: install
    - name: Test Code
      uses: mujo-code/puppeteer-headful@16.6.0
      env:
        CI: "true"
      with:
        args: "node .github/workflows/generate-pdf.js"

    #- uses: tj-actions/puppeteer@v5
    #  id: puppeteer
    #  with:
    #    files: |
    #      .github/workflows/generate-pdf.js

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mock-pdf
        path: output/mock.pdf
